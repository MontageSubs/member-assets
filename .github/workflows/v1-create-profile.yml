name: v1 - Create Profile

on:
  workflow_dispatch:
    inputs:
      display_name:
        description: Display name / 昵称
        required: true
        type: string
      github:
        description: GitHub username or profile URL (optional) / GitHub 用户名或主页链接（可选）
        required: false
        type: string

permissions:
  contents: write

jobs:
  create-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Ensure v1 branch exists
        env:
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          if ! git ls-remote --exit-code --heads origin v1 > /dev/null 2>&1; then
            git config user.name "$ACTOR"
            git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"
            EMPTY_TREE=$(git hash-object -t tree /dev/null)
            COMMIT=$(git commit-tree "$EMPTY_TREE" -m "chore: initialize v1 data branch")
            git push origin "${COMMIT}:refs/heads/v1"
          fi

      - uses: actions/checkout@v4
        with:
          ref: v1
          path: v1-data

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install uv && uv pip install --system pyyaml pillow

      - id: create
        env:
          INPUT_DISPLAY_NAME: ${{ inputs.display_name }}
          INPUT_GITHUB: ${{ inputs.github }}
          DATA_ROOT: ${{ github.workspace }}/v1-data
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python v1/scripts/create_profile.py

      - working-directory: v1-data
        env:
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          git config user.name "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"
          git add members README.md
          git commit -m "feat: add member ${{ steps.create.outputs.member_id }}"
          git push origin v1

      - env:
          INPUT_MEMBER_ID: ${{ steps.create.outputs.member_id }}
          DATA_ROOT: ${{ github.workspace }}/v1-data
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python v1/scripts/sync_avatars.py

      - working-directory: v1-data
        env:
          ACTOR: ${{ github.actor }}
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          git config user.name "$ACTOR"
          git config user.email "${ACTOR_ID}+${ACTOR}@users.noreply.github.com"
          git add cache
          git diff --cached --quiet || git commit -m "chore: cache avatar hashes for ${{ steps.create.outputs.member_id }}"
          git push origin v1
